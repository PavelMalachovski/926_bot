[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests
    integration: Integration tests
    asyncio: Async tests

asyncio_mode = auto

addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

minversion = 6.0

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
